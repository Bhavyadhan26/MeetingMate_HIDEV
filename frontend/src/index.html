<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chief of Staff</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>AI Chief of Staff</h1>
          <p>Meeting command center for decisions, drift, and organizational recall.</p>
        </div>
        <span id="status" class="status">Ready</span>
      </section>

      <section class="workspace">
        <form id="upload-form" class="panel">
          <h2>Transcript</h2>
          <input id="title" value="Platform architecture sync" aria-label="Meeting title" />
          <input id="team" value="demo-team" aria-label="Team id" />
          <input id="attendees" value="Asha Rao, Marco Lee" aria-label="Attendees" />
          <input id="upload-agenda" value="memory ledger, ingestion" aria-label="Meeting agenda topics" />
          <textarea id="transcript" aria-label="Transcript">Asha Rao: We decided use Qdrant as the persistent vector ledger. Marco will prepare the ingestion checklist by Friday.</textarea>
          <button type="submit">Process Meeting</button>
        </form>

        <section class="panel">
          <h2>Recall</h2>
          <div class="search-row">
            <input id="query" value="What did we decide about Qdrant?" aria-label="Search memory" />
            <button id="search" type="button">Search</button>
          </div>
          <div id="answer" class="answer"></div>
        </section>
      </section>

      <section class="panel">
        <h2>Pre-Meeting Brief</h2>
        <div class="search-row">
          <input id="agenda" value="Qdrant ledger" aria-label="Agenda topics" />
          <button id="brief" type="button">Brief</button>
        </div>
        <div id="brief-output" class="answer"></div>
      </section>

      <section class="panel">
        <h2>Summary</h2>
        <div id="summary" class="answer empty-state">No meeting processed yet.</div>
      </section>

      <section class="panel">
        <h2>Action Items</h2>
        <div id="actions" class="action-list empty-state">No action items yet.</div>
      </section>

      <section class="panel">
        <h2>Decisions</h2>
        <div class="review-row">
          <input id="resolver" value="Team Lead" aria-label="Resolver name" />
          <select id="resolver-role" aria-label="Resolver role">
            <option value="team_lead">team_lead</option>
            <option value="decision_owner">decision_owner</option>
            <option value="admin">admin</option>
            <option value="observer">observer</option>
          </select>
          <input id="resolution-note" value="Acknowledged and resolved in review." aria-label="Resolution note" />
        </div>
        <div class="search-row">
          <button id="refresh-conflicts" type="button">Refresh Conflicts</button>
          <span id="conflict-count" class="status">0 open</span>
        </div>
        <div id="conflicts" class="decision-list empty-state">No unresolved conflicts loaded.</div>
        <div id="decisions" class="decision-list empty-state">No decisions yet.</div>
      </section>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
