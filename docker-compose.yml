services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      MEMORY_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      LOCAL_MEMORY_PATH: /workspace/backend/app/memory/local_ledger.json
      TRACE_OUTPUT_PATH: /workspace/backend/app/observability/local_traces.jsonl
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
