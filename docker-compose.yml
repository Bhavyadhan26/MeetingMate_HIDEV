services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meetingmate}
      POSTGRES_USER: ${POSTGRES_USER:-meetingmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meetingmate_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: local
      MEMORY_BACKEND: ${MEMORY_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://meetingmate:meetingmate_local@postgres:5432/meetingmate}
      SQLITE_METADATA_PATH: /workspace/backend/app/persistence/meetingmate.sqlite3
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_CLAIMS_NAMESPACE: ${AUTH0_CLAIMS_NAMESPACE:-https://meetingmate}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-0}
      REDACTION_MAP_ENCRYPTION_KEY: ${REDACTION_MAP_ENCRYPTION_KEY:-}
      LYZR_OTLP_ENDPOINT: ${LYZR_OTLP_ENDPOINT:-}
      LYZR_API_KEY: ${LYZR_API_KEY:-}
      LYZR_OTLP_HEADERS: ${LYZR_OTLP_HEADERS:-}
      LOCAL_MEMORY_PATH: /workspace/backend/app/memory/local_ledger.json
      TRACE_OUTPUT_PATH: /workspace/backend/app/observability/local_traces.jsonl
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_storage:
  qdrant_storage:
