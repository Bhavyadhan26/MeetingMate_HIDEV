services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      MEMORY_BACKEND: ${MEMORY_BACKEND:-qdrant}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      LYZR_OTLP_ENDPOINT: ${LYZR_OTLP_ENDPOINT:-}
      LYZR_API_KEY: ${LYZR_API_KEY:-}
      LYZR_OTLP_HEADERS: ${LYZR_OTLP_HEADERS:-}
      LOCAL_MEMORY_PATH: /workspace/backend/app/memory/local_ledger.json
      TRACE_OUTPUT_PATH: /workspace/backend/app/observability/local_traces.jsonl
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  qdrant_storage:
